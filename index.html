<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CinePulse</title>
    <link class="apple-touch-icon" href="https://fav.farm/🎬">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #000000; --surface: #1c1c1e; --surface2: #2c2c2e; --surface3: #3a3a3c;
            --separator: rgba(255,255,255,0.09); --label: #ffffff; --label2: #98989d;
            --label3: #636366; --accent: #ff9f0a; --blue: #007aff; --green: #30d158; --red: #ff453a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent;}
        body { background: var(--bg); color: var(--label); padding: calc(env(safe-area-inset-top) + 0.6rem) 0.8rem 6rem 0.8rem; }
        .container { max-width: 800px; margin: 0 auto; }
        header { padding: 0.4rem 0.1rem; display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
        h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
        
        .header-actions { display: flex; gap: 0.5rem; }
        .btn-panel { background: var(--surface2); border: 1px solid var(--surface3); color: white; padding: 0.4rem 0.8rem; border-radius: 8px; font-weight: 600; font-size: 0.82rem; cursor: pointer; display: flex; align-items: center; gap: 0.3rem; }
        .btn-panel.spinning { animation: spin 1s linear infinite; opacity: 0.6; pointer-events: none; }

        .filter-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0.4rem; margin-bottom: 0.6rem; }
        .filter-panel select { background: var(--surface); border: 1px solid var(--surface2); padding: 0.55rem; border-radius: 8px; color: white; font-size: 0.78rem; outline: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='none' stroke='%2398989d' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M4 6l4 4 4-4'/></svg>"); background-repeat: no-repeat; background-position: right 8px center; padding-right: 24px;}

        .search-row { display: flex; gap: 0.4rem; margin-bottom: 0.8rem; flex-wrap: wrap;}
        .search-input { flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--surface2); padding: 0.6rem; border-radius: 8px; color: white; font-size: 0.88rem; outline: none; margin-bottom: 0;}
        .sort-select { background: var(--surface); border: 1px solid var(--surface2); padding: 0.6rem; border-radius: 8px; color: white; font-size: 0.8rem; outline: none; -webkit-appearance: none; width: auto; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='none' stroke='%2398989d' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M4 6l4 4 4-4'/></svg>"); background-repeat: no-repeat; background-position: right 8px center; padding-right: 24px;}

        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.8rem; }
        @media (max-width: 480px) { .catalog-grid { grid-template-columns: 1fr 1fr; gap: 0.5rem; } }

        .movie-card { background: var(--surface); border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid var(--separator); position: relative; }
        .movie-card.is-watched .poster-img { opacity: 0.35; filter: grayscale(80%); }
        .movie-card.is-watched .movie-title { color: var(--label2); }

        .poster-wrapper { width: 100%; aspect-ratio: 2/3; background: var(--surface2); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .poster-img { width: 100%; height: 100%; object-fit: cover; transition: all 0.3s ease; }
        
        .rating-badge { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.8); padding: 0.2rem 0.4rem; border-radius: 6px; font-size: 0.72rem; font-weight: 700; color: var(--accent); }
        .folder-badge { position: absolute; top: 6px; left: 6px; background: rgba(0,122,255,0.85); padding: 0.2rem 0.4rem; border-radius: 6px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }
        .shortlist-badge { position: absolute; top: 6px; left: 50%; transform: translateX(-50%); background: rgba(255,159,10,0.9); padding: 0.2rem 0.6rem; border-radius: 6px; font-size: 0.65rem; font-weight: 800; color: #000; letter-spacing: 0.02em; }
        .watched-badge { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); background: rgba(48,209,88,0.9); padding: 0.2rem 0.6rem; border-radius: 6px; font-size: 0.7rem; font-weight: 800; color: #000; letter-spacing: 0.02em; }

        .movie-info { padding: 0.5rem; display: flex; flex-direction: column; gap: 0.2rem; flex: 1; }
        .movie-title { font-size: 0.88rem; font-weight: 700; line-height: 1.2; min-height: 2.2rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .movie-meta { font-size: 0.68rem; color: var(--label2); }
        .movie-plot { font-size: 0.72rem; color: var(--label2); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-top: 0.1rem; flex: 1; }
        
        .card-actions { border-top: 1px solid var(--separator); padding: 0.4rem; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 0.3rem; background: rgba(255,255,255,0.01); }
        .btn-card { flex: 1 1 45%; background: var(--surface2); border: none; color: var(--label); font-size: 0.7rem; font-weight: 600; cursor: pointer; padding: 0.4rem 0.2rem; border-radius: 6px; }
        .btn-card.del { color: var(--red); flex-basis: 100%; margin-top: 2px; }
        .btn-card.action { color: var(--blue); }
        .btn-card.success { color: var(--green); }
        
        .empty-state { grid-column: 1/-1; text-align: center; color: var(--label3); padding: 4rem 1rem; font-size: 0.88rem; }
        
        /* Formularios y Modales */
        .form-card { background: var(--surface); border-radius: 14px; margin-bottom: 0.8rem; overflow: hidden; border: 1px solid var(--separator); }
        .form-toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0.9rem; cursor: pointer; }
        .form-toggle-row .label { font-weight: 700; font-size: 0.88rem; display: flex; align-items: center; gap: 0.4rem; color: var(--accent); }
        .form-card.open .chevron { transform: rotate(180deg); }
        .form-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .form-card.open .form-body { max-height: 1500px; }
        .form-body-inner { padding: 0.1rem 0.9rem 0.9rem 0.9rem; display: flex; flex-direction: column; gap: 0.6rem; }
        
        .form-group { display: flex; flex-direction: column; gap: 0.25rem; }
        .form-group label { font-size: 0.65rem; font-weight: 600; color: var(--label2); text-transform: uppercase; letter-spacing: 0.02em; }
        .form-group input, .form-group select, .form-group textarea { background: var(--surface2); border: none; padding: 0.65rem 0.75rem; border-radius: 8px; color: var(--label); font-size: 0.88rem; outline: none; }
        .row-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
        
        .scraper-group { display: flex; gap: 0.4rem; margin-bottom: 0.5rem; }
        .scraper-group input { flex: 1; background: var(--surface2); border: none; padding: 0.65rem 0.75rem; border-radius: 8px; color: white; font-size: 0.88rem; outline: none;}
        .btn-scrap { background: var(--blue); color: white; border: none; padding: 0 0.8rem; border-radius: 8px; font-weight: 600; font-size: 0.82rem; cursor: pointer; }

        .omdb-results-box { display: none; flex-direction: column; gap: 0.4rem; max-height: 250px; overflow-y: auto; background: var(--surface2); padding: 0.5rem; border-radius: 8px; margin-bottom: 0.5rem; }
        .omdb-item { display: flex; gap: 0.6rem; align-items: center; cursor: pointer; padding: 0.4rem; background: var(--surface3); border-radius: 6px; transition: background 0.1s; }
        .omdb-item:hover { background: var(--separator); }
        .omdb-item img { width: 35px; height: 50px; object-fit: cover; border-radius: 4px; background: #000; }
        .omdb-item-info { display: flex; flex-direction: column; justify-content: center; }

        .btn-add { background: var(--accent); color: black; border: none; padding: 0.75rem; border-radius: 10px; font-weight: 700; font-size: 0.9rem; margin-top: 0.5rem; cursor: pointer; }

        .footer { margin-top: 2rem; text-align: center; padding-bottom: 2rem; display: flex; flex-direction: column; gap: 0.8rem; align-items: center;}
        .btn-footer { background: transparent; border: none; color: var(--label3); font-size: 0.75rem; text-decoration: underline; cursor: pointer; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>CinePulse</h1>
                <div style="font-size:0.75rem; color:var(--label2);">Catálogo Manual Cloud</div>
            </div>
            <div class="header-actions">
                <button class="btn-panel" id="btnCloudSync" onclick="manualSync()">🔄 Sincronizar</button>
            </div>
        </header>

        <div class="form-card" id="formCard">
            <div class="form-toggle-row" onclick="toggleForm()">
                <span class="label">➕ Añadir Medio al Catálogo</span>
                <span class="chevron" style="font-size:0.7rem; color:var(--label3); transition: transform 0.2s;">▼</span>
            </div>
            <div class="form-body">
                <div class="form-body-inner">
                    <div class="form-group" style="background: rgba(0,122,255,0.1); padding: 0.6rem; border-radius: 10px; border: 1px solid rgba(0,122,255,0.3);">
                        <label style="color: var(--blue);">1. Buscar título o pegar Link/ID de IMDb</label>
                        <div class="scraper-group">
                            <input type="text" id="omdbSearchInput" placeholder="Ej: Anniversary 2024 o https://imdb.com/..." onkeypress="if(event.key==='Enter') searchOMDb()">
                            <button class="btn-scrap" id="btnSearchOMDb" onclick="searchOMDb()">Buscar</button>
                        </div>
                        <div class="omdb-results-box" id="omdbResults"></div>
                    </div>

                    <div class="row-inputs" style="grid-template-columns: 1fr 1fr 1fr;">
                        <div class="form-group">
                            <label>Disco Físico</label>
                            <input type="text" id="fDisk" value="Adata" placeholder="Ej: Adata">
                        </div>
                        <div class="form-group">
                            <label>Ubicación</label>
                            <select id="fCategory">
                                <option value="all">Raíz</option>
                                <option value="bere">Bere</option>
                                <option value="milo">Milo</option>
                                <option value="series">Series</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Tipo</label>
                            <select id="fType">
                                <option value="Película">Película</option>
                                <option value="Serie">Serie</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="row-inputs">
                        <div class="form-group">
                            <label>Título Limpio</label>
                            <input type="hidden" id="fImdbID">
                            <input type="text" id="fTitle" placeholder="Ej: Inception">
                        </div>
                        <div class="form-group">
                            <label>Año</label>
                            <input type="text" id="fYear" placeholder="Ej: 2010">
                        </div>
                    </div>

                    <div class="row-inputs">
                        <div class="form-group">
                            <label>Rating (IMDb)</label>
                            <input type="text" id="fRating" placeholder="Ej: 8.8">
                        </div>
                        <div class="form-group">
                            <label>Género · Actores</label>
                            <input type="text" id="fMeta" placeholder="Ej: Sci-Fi · DiCaprio">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>URL Póster</label>
                        <input type="text" id="fPoster" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>Sinopsis</label>
                        <textarea id="fPlot" rows="3" placeholder="Trama..."></textarea>
                    </div>

                    <button class="btn-add" onclick="addManualMovie()">Guardar en Catálogo</button>
                </div>
            </div>
        </div>

        <!-- Panel de Búsqueda & Ordenamiento -->
        <div class="search-row">
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar en tu catálogo..." oninput="render()">
            <select id="sortSelect" class="sort-select" onchange="render()">
                <option value="newest">↕️ Ordenar: Recientes</option>
                <option value="year_desc">↕️ Año (Nuevo a Viejo)</option>
                <option value="year_asc">↕️ Año (Viejo a Nuevo)</option>
                <option value="title_az">↕️ Título (A-Z)</option>
                <option value="rating_desc">↕️ Rating (Mayor a Menor)</option>
            </select>
        </div>

        <div class="filter-panel">
            <select id="filtShortlist" onchange="render()" style="color: var(--accent); font-weight: bold;">
                <option value="">Todas las Pelis/Series</option>
                <option value="true">📌 Próximas a Ver</option>
            </select>
            <select id="filtWatched" onchange="render()">
                <option value="">Vista / No Vista</option>
                <option value="false">👀 No Vistas</option>
                <option value="true">✅ Vistas</option>
            </select>
            <select id="filtDisk" onchange="render()"><option value="">Cualquier Disco</option></select>
            <select id="filtLocation" onchange="render()">
                <option value="">Cualquier Directorio</option>
                <option value="all">Raíz</option>
                <option value="bere">Bere</option>
                <option value="milo">Milo</option>
                <option value="series">Series</option>
            </select>
            <select id="filtType" onchange="render()">
                <option value="">Cualquier Tipo</option>
                <option value="Película">Películas</option>
                <option value="Serie">Series</option>
            </select>
            <select id="filtGenre" onchange="render()"><option value="">Cualquier Género</option></select>
        </div>

        <div class="catalog-grid" id="catalogGrid"></div>

        <div class="footer">
            <button class="btn-panel scan" style="margin:0 auto; background: var(--surface2); border-color: var(--surface3); display: none;" id="btnScan" onclick="triggerDirectoryScan()">📁 Scan Directorio (Automático)</button>
            <input type="file" id="directoryInput" webkitdirectory directory multiple onchange="handleDirectorySelection(event)" style="display: none;">
            
            <button class="btn-footer" style="margin-top:0.5rem;" onclick="setupOMDbKey()">⚙️ Configurar OMDb API Key</button>
            <button class="btn-footer" onclick="forceSetupCredentials()">⚙️ Configurar GitHub Gist (Sync)</button>
            <button class="btn-footer" style="color: var(--red); margin-top: 1rem; font-weight:bold;" onclick="wipeCatalog()">🗑️ BORRAR TODO EL CATÁLOGO</button>
        </div>
    </div>

    <script>
        const FALLBACK_PLOT = "Indexado localmente en frío. Conectate a internet para scrapear OMDb.";
        
        let state = JSON.parse(localStorage.getItem('cinepulse_cloud_state_v4')) || { 
            updatedAt: 0, 
            omdbKey: '', 
            movies: [] 
        };

        // Data Normalization (Defensive Initialization)
        if(state.movies && Array.isArray(state.movies)) {
            state.movies.forEach(m => {
                if(!m.disk || m.disk.trim() === "") m.disk = "Adata";
            });
        }

        function toggleForm() {
            document.getElementById('formCard').classList.toggle('open');
        }

        function getOMDbKey() { return state.omdbKey || ""; }

        function setupOMDbKey() {
            const n = prompt("Ingresá tu API Key de OMDb:", state.omdbKey);
            if(n !== null) {
                state.omdbKey = n.trim();
                save();
                alert("Key de OMDb guardada.");
            }
        }

        function getSyncCredentials() {
            let token = localStorage.getItem('wishlist_gh_token') || '';
            let gistId = localStorage.getItem('wishlist_gh_gist') || '';
            return { token, gistId };
        }

        function forceSetupCredentials() {
            const t = prompt("GitHub Token (PAT):", localStorage.getItem('wishlist_gh_token') || '');
            const g = prompt("Gist ID de respaldo:", localStorage.getItem('wishlist_gh_gist') || '');
            if(t !== null && g !== null) {
                localStorage.setItem('wishlist_gh_token', t.trim());
                localStorage.setItem('wishlist_gh_gist', g.trim());
                manualSync();
            }
        }

        async function save() {
            state.updatedAt = Date.now();
            localStorage.setItem('cinepulse_cloud_state_v4', JSON.stringify(state));
            populateTaxonomies();
            render();
            await autoPushToCloud();
        }

        // ==========================================
        // SCAN DIRECTORIO AUTO
        // ==========================================
        let scanTargetDisk = "Adata";

        function triggerDirectoryScan() {
            const d = prompt("¿A qué Disco Físico pertenecen estos archivos?", "Adata");
            if (d !== null) {
                scanTargetDisk = d.trim() || "Adata";
                document.getElementById('directoryInput').click();
            }
        }

        function cleanReleaseName(filename) {
            let name = filename.replace(/\.[^/.]+$/, "");
            name = name.replace(/\.(2160p|1080p|720p|4k|bluray|x264|x265|web|webdl|webrip|hdr|hevc|aac5\.1|10bit|h265|ita|eng|yts|brrip|hdrip|dvdrip|graces|cyber|turko|oft|mx|bz|gg|world|trial).*/i, '');
            name = name.replace(/\b(19|20)\d{2}\b/g, '');
            name = name.replace(/[._\-]/g, ' ').replace(/\s+/g, ' ').trim();
            return name;
        }

        async function handleDirectorySelection(event) {
            const files = event.target.files;
            if(!files || files.length === 0) return;

            const apiKey = getOMDbKey();
            if(!apiKey) alert("Sin API Key. Se leerán los nombres pero sin metadata.");

            const btn = document.getElementById('btnScan');
            btn.classList.add('spinning');
            btn.textContent = "...";

            const validExtensions = ['.mkv', '.mp4', '.avi', '.mov'];
            const currentMoviesMap = { ...state.movies.reduce((acc, m) => ({ ...acc, [m.rawName]: m }), {}) };
            const detectedMovies = [];

            for(let i = 0; i < files.length; i++) {
                const file = files[i];
                const relativePath = file.webkitRelativePath || file.name;
                const lowerPath = relativePath.toLowerCase();

                if(!validExtensions.some(ext => lowerPath.endsWith(ext))) continue;

                const rawName = file.name.replace(/\.[^/.]+$/, "");

                let category = 'all';
                if(lowerPath.includes('/bere/')) category = 'bere';
                else if(lowerPath.includes('/milo/')) category = 'milo';
                else if(lowerPath.includes('/series/')) category = 'series';
                
                let defaultType = category === 'series' ? 'Serie' : 'Película';

                if(currentMoviesMap[rawName]) {
                    let existingMovie = currentMoviesMap[rawName];
                    existingMovie.category = category;
                    existingMovie.type = existingMovie.type || defaultType;
                    existingMovie.disk = existingMovie.disk || scanTargetDisk;

                    if (apiKey && (existingMovie.plot === FALLBACK_PLOT || existingMovie.rating === "0.0" || existingMovie.rating === "")) {
                        const cleanedTitle = cleanReleaseName(file.name);
                        const yearMatch = file.name.match(/\b(19|20)\d{2}\b/);
                        const yearParam = yearMatch ? `&y=${yearMatch[0]}` : '';

                        try {
                            await new Promise(r => setTimeout(r, 250));
                            const res = await fetch(`https://www.omdbapi.com/?apikey=${apiKey}&t=${encodeURIComponent(cleanedTitle)}${yearParam}&plot=full`);
                            const data = await res.json();
                            if(data && data.Response === "True") {
                                const rawActors = data.Actors ? data.Actors.split(',') : [];
                                existingMovie.imdbID = data.imdbID || existingMovie.imdbID;
                                existingMovie.title = data.Title || existingMovie.title;
                                existingMovie.year = data.Year || existingMovie.year;
                                existingMovie.rating = data.imdbRating !== "N/A" ? data.imdbRating : "0.0";
                                existingMovie.meta = `${data.Genre || 'Varios'} · ${rawActors.slice(0,3).map(a=>a.trim()).join(', ')}`;
                                existingMovie.poster = data.Poster !== "N/A" ? data.Poster : "";
                                existingMovie.plot = data.Plot !== "N/A" ? data.Plot : existingMovie.plot;
                                existingMovie.type = data.Type === "series" ? "Serie" : "Película";
                            }
                        } catch(err) { console.log("Fallo red re-scrape"); }
                    }
                    detectedMovies.push(existingMovie);
                    continue;
                }

                const cleanedTitle = cleanReleaseName(file.name);
                const yearMatch = file.name.match(/\b(19|20)\d{2}\b/);
                const yearParam = yearMatch ? `&y=${yearMatch[0]}` : '';

                let movieEntry = {
                    id: 'v_' + Date.now() + '_' + i,
                    imdbID: '', title: cleanedTitle, year: yearMatch ? yearMatch[0] : "N/A",
                    rating: "0.0", category: category, type: defaultType, disk: scanTargetDisk,
                    meta: "Desconocido", poster: "", plot: FALLBACK_PLOT, rawName: rawName,
                    watched: false, shortlisted: false
                };

                if(apiKey) {
                    try {
                        await new Promise(r => setTimeout(r, 250));
                        const res = await fetch(`https://www.omdbapi.com/?apikey=${apiKey}&t=${encodeURIComponent(cleanedTitle)}${yearParam}&plot=full`);
                        const data = await res.json();
                        if(data && data.Response === "True") {
                            const rawActors = data.Actors ? data.Actors.split(',') : [];
                            movieEntry.imdbID = data.imdbID || "";
                            movieEntry.title = data.Title || movieEntry.title;
                            movieEntry.year = data.Year || movieEntry.year;
                            movieEntry.rating = data.imdbRating !== "N/A" ? data.imdbRating : "0.0";
                            movieEntry.meta = `${data.Genre || 'Varios'} · ${rawActors.slice(0,3).map(a=>a.trim()).join(', ')}`;
                            movieEntry.poster = data.Poster !== "N/A" ? data.Poster : "";
                            movieEntry.plot = data.Plot !== "N/A" ? data.Plot : movieEntry.plot;
                            movieEntry.type = data.Type === "series" ? "Serie" : "Película";
                        }
                    } catch(err) {}
                }
                detectedMovies.push(movieEntry);
            }

            state.movies = detectedMovies;
            await save();

            document.getElementById('directoryInput').value = '';
            btn.classList.remove('spinning');
            btn.textContent = "📁 Scan Directorio (Automático)";
            alert(`Directorio procesado. ${detectedMovies.length} archivos en disco "${scanTargetDisk}".`);
        }

        // ==========================================
        // BÚSQUEDA OMDB MANUAL
        // ==========================================
        async function searchOMDb() {
            const query = document.getElementById('omdbSearchInput').value.trim();
            const apiKey = getOMDbKey();
            if (!apiKey) { alert("Configurá tu API Key de OMDb primero."); return; }
            if (!query) return;

            const resDiv = document.getElementById('omdbResults');
            const btnSearch = document.getElementById('btnSearchOMDb');
            
            resDiv.style.display = "flex";
            resDiv.innerHTML = "<div style='color:var(--label2); text-align:center; padding:1rem;'>Buscando...</div>";
            btnSearch.disabled = true;

            try {
                const imdbMatch = query.match(/tt\d{7,10}/);
                if (imdbMatch) {
                    const imdbID = imdbMatch[0];
                    const res = await fetch(`https://www.omdbapi.com/?apikey=${apiKey}&i=${imdbID}&plot=full`);
                    const data = await res.json();
                    
                    if (data.Response === "True") {
                        const typeLabel = data.Type === 'series' ? 'Serie' : 'Película';
                        const posterUrl = data.Poster !== 'N/A' ? data.Poster : '';
                        resDiv.innerHTML = `
                        <div class="omdb-item" onclick="selectOMDbResult('${data.imdbID}')">
                            <img src="${posterUrl}" alt="Póster">
                            <div class="omdb-item-info">
                                <span style="font-size:0.85rem; font-weight:700; color:var(--label);">${data.Title}</span>
                                <span style="font-size:0.7rem; color:var(--label2);">${data.Year} · ${typeLabel} (Match Directo)</span>
                            </div>
                        </div>`;
                    } else {
                        resDiv.innerHTML = `<div style="color:var(--red); font-size:0.8rem; text-align:center; padding:0.5rem;">🚨 ID de IMDb inválido.</div>`;
                    }
                } else {
                    let searchUrl = `https://www.omdbapi.com/?apikey=${apiKey}&s=${encodeURIComponent(query)}`;
                    const yearMatch = query.match(/\b(19|20)\d{2}\b/);
                    
                    if(yearMatch) {
                        const cleanTitle = query.replace(yearMatch[0], '').trim();
                        searchUrl = `https://www.omdbapi.com/?apikey=${apiKey}&s=${encodeURIComponent(cleanTitle)}&y=${yearMatch[0]}`;
                    }

                    const res = await fetch(searchUrl);
                    const data = await res.json();
                    
                    if (data.Response === "True") {
                        resDiv.innerHTML = data.Search.map(m => {
                            const typeLabel = m.Type === 'series' ? 'Serie' : 'Película';
                            const posterUrl = m.Poster !== 'N/A' ? m.Poster : '';
                            return `
                            <div class="omdb-item" onclick="selectOMDbResult('${m.imdbID}')">
                                <img src="${posterUrl}" alt="Póster">
                                <div class="omdb-item-info">
                                    <span style="font-size:0.85rem; font-weight:700; color:var(--label);">${m.Title}</span>
                                    <span style="font-size:0.7rem; color:var(--label2);">${m.Year} · ${typeLabel}</span>
                                </div>
                            </div>`;
                        }).join('');
                    } else {
                        let errorMsg = data.Error || "Error desconocido";
                        if (errorMsg === "Too many results.") errorMsg = "Demasiados resultados. Agregá el año o pegá el link de IMDb.";
                        else if (errorMsg === "Movie not found!") errorMsg = `No se encontraron coincidencias.`;
                        else if (errorMsg === "Invalid API key!") errorMsg = "La API Key de OMDb es inválida.";
                        resDiv.innerHTML = `<div style="color:var(--red); font-size:0.8rem; text-align:center; padding:0.5rem;">🚨 ${errorMsg}</div>`;
                    }
                }
            } catch (e) {
                resDiv.innerHTML = "<div style='color:var(--red); font-size:0.8rem; text-align:center; padding:0.5rem;'>Error de red al consultar OMDb.</div>";
            } finally {
                btnSearch.disabled = false;
            }
        }

        async function selectOMDbResult(imdbID) {
            const apiKey = getOMDbKey();
            const resDiv = document.getElementById('omdbResults');
            resDiv.innerHTML = "<div style='color:var(--accent); text-align:center; padding:1rem;'>Descargando ficha completa...</div>";
            
            try {
                const res = await fetch(`https://www.omdbapi.com/?apikey=${apiKey}&i=${imdbID}&plot=full`);
                const data = await res.json();
                if (data.Response === "True") {
                    document.getElementById('fImdbID').value = imdbID || "";
                    document.getElementById('fTitle').value = data.Title || "";
                    document.getElementById('fYear').value = data.Year || "";
                    document.getElementById('fRating').value = data.imdbRating !== "N/A" ? data.imdbRating : "0.0";
                    document.getElementById('fType').value = data.Type === "series" ? "Serie" : "Película";

                    const rawActors = data.Actors ? data.Actors.split(',') : [];
                    const actors = rawActors.slice(0,3).map(a => a.trim());
                    document.getElementById('fMeta').value = `${data.Genre || 'Varios'} · ${actors.join(', ')}`;
                    document.getElementById('fPoster').value = data.Poster !== "N/A" ? data.Poster : "";
                    document.getElementById('fPlot').value = data.Plot !== "N/A" ? data.Plot : "";

                    if(data.Type === "series") {
                        document.getElementById('fCategory').value = "series";
                        if(data.totalSeasons && data.totalSeasons !== "N/A") {
                            window.tempSeriesTotalSeasons = data.totalSeasons;
                        }
                    }

                    resDiv.style.display = "none";
                }
            } catch (e) {
                alert("Error obteniendo detalles.");
                resDiv.style.display = "none";
            }
        }

        async function addManualMovie() {
            const title = document.getElementById('fTitle').value.trim();
            if (!title) { alert("El Título es obligatorio."); return; }

            const category = document.getElementById('fCategory').value;
            const type = document.getElementById('fType').value;
            const disk = document.getElementById('fDisk').value.trim() || "Adata";
            
            let seriesDefaultInfo = "";
            if (type === "Serie" && window.tempSeriesTotalSeasons) {
                seriesDefaultInfo = `${window.tempSeriesTotalSeasons} Temporadas (Info OMDb)`;
                window.tempSeriesTotalSeasons = null;
            }

            const newMovie = {
                id: 'm_' + Date.now(),
                imdbID: document.getElementById('fImdbID').value.trim(),
                title: title,
                year: document.getElementById('fYear').value.trim() || "N/A",
                rating: document.getElementById('fRating').value.trim() || "0.0",
                category: category,
                type: type,
                disk: disk,
                meta: document.getElementById('fMeta').value.trim() || "Desconocido",
                poster: document.getElementById('fPoster').value.trim(),
                plot: document.getElementById('fPlot').value.trim() || "Sin sinopsis cargada.",
                watched: false,
                shortlisted: false,
                seriesInfo: seriesDefaultInfo,
                rawName: title.toLowerCase().replace(/[^a-z0-9]/g, '_')
            };

            state.movies.unshift(newMovie);
            await save();

            // Limpieza silenciosa sin cerrar modal
            document.getElementById('fImdbID').value = "";
            document.getElementById('fTitle').value = ""; document.getElementById('fYear').value = "";
            document.getElementById('fRating').value = ""; document.getElementById('fMeta').value = "";
            document.getElementById('fPoster').value = ""; document.getElementById('fPlot').value = "";
            document.getElementById('omdbSearchInput').value = ""; document.getElementById('omdbResults').style.display = "none";
            
            document.getElementById('omdbSearchInput').focus();
        }

        // ==========================================
        // ACCIONES DE TARJETA
        // ==========================================
        async function toggleWatched(id) {
            const m = state.movies.find(m => m.id === id);
            if(!m) return;
            m.watched = !m.watched;
            await save();
        }

        async function toggleShortlist(id) {
            const m = state.movies.find(m => m.id === id);
            if(!m) return;
            m.shortlisted = !m.shortlisted;
            await save();
        }

        async function showSeriesDetails(id) {
            const m = state.movies.find(m => m.id === id);
            if(!m) return;
            const currentInfo = m.seriesInfo || "No especificado";
            const updated = prompt(`Info de Descargas para "${m.title}":\n\nAnotá qué temporadas/episodios tenés en el directorio:`, currentInfo);
            if(updated !== null) {
                m.seriesInfo = updated.trim();
                await save();
            }
        }

        async function editMovieInline(id) {
            const m = state.movies.find(m => m.id === id);
            if(!m) return;
            const t = prompt("Modificar Título:", m.title);
            const d = prompt("Modificar Disco Físico (Adata, Expansion, etc):", m.disk || "Adata");
            const r = prompt("Modificar Rating (IMDb):", m.rating);
            if(t !== null && r !== null && d !== null) {
                m.title = t.trim() || m.title;
                m.disk = d.trim() || m.disk;
                m.rating = r.trim() || m.rating;
                await save();
            }
        }

        async function deleteMovie(id) {
            if(confirm("¿Quitar definitivamente del catálogo?")) {
                state.movies = state.movies.filter(m => m.id !== id);
                await save();
            }
        }

        async function wipeCatalog() {
            if (confirm("⚠️ ATENCIÓN: Estás a punto de borrar TODO tu catálogo de películas y series.") && 
                confirm("🚨 ¿ESTÁS ABSOLUTAMENTE SEGURO? Esta acción es irreversible.")) {
                state.movies = [];
                await save();
                alert("Catálogo reiniciado a cero exitosamente.");
            }
        }

        // ==========================================
        // SYNC Y RENDER
        // ==========================================
        let isSyncingLock = false;
        
        async function autoPullFromCloud(isForcedManual = false) {
            if(isSyncingLock && !isForcedManual) return;
            const creds = getSyncCredentials();
            if(!creds.token || !creds.gistId) return;

            const syncBtn = document.getElementById('btnCloudSync');
            if(syncBtn) syncBtn.classList.add('spinning');

            try {
                const res = await fetch(`https://api.github.com/gists/${creds.gistId}?_cb=${Date.now()}`, {
                    headers: { 'Authorization': `token ${creds.token}` }
                });
                if(res.ok) {
                    const gistData = await res.json();
                    if(gistData.files && gistData.files["movie_catalog.json"]) {
                        const cloudContent = JSON.parse(gistData.files["movie_catalog.json"].content);
                        const cloudUpdatedAt = cloudContent.updatedAt || 0;
                        
                        if(cloudUpdatedAt > state.updatedAt || isForcedManual) {
                            state = cloudContent;
                            
                            // Data Normalization (Defensive Initialization)
                            if(state.movies && Array.isArray(state.movies)) {
                                state.movies.forEach(m => {
                                    if(!m.disk || m.disk.trim() === "") m.disk = "Adata";
                                });
                            }

                            localStorage.setItem('cinepulse_cloud_state_v4', JSON.stringify(state));
                            populateTaxonomies();
                            render();
                        } else if(state.updatedAt > cloudUpdatedAt) {
                            await autoPushToCloud(true);
                        }
                    }
                }
            } catch(e) { 
                console.log("Modo offline activo."); 
            } finally { if(syncBtn) syncBtn.classList.remove('spinning'); }
        }

        async function autoPushToCloud(bypassLock = false) {
            if(isSyncingLock && !bypassLock) return;
            const creds = getSyncCredentials();
            if(!creds.token || !creds.gistId) return;
            
            isSyncingLock = true;
            const syncBtn = document.getElementById('btnCloudSync');
            if(syncBtn) syncBtn.classList.add('spinning');

            try {
                await fetch(`https://api.github.com/gists/${creds.gistId}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `token ${creds.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ files: { "movie_catalog.json": { content: JSON.stringify(state, null, 2) } } })
                });
            } catch(e) { 
                console.log("Push de datos interceptado (Offline)."); 
            } finally { isSyncingLock = false; if(syncBtn) syncBtn.classList.remove('spinning'); }
        }

        async function manualSync() {
            const creds = getSyncCredentials();
            if(!creds.token || !creds.gistId) { forceSetupCredentials(); return; }
            await autoPullFromCloud(true);
            await autoPushToCloud(true);
            alert("🔄 Sincronización con GitHub completada.");
        }

        function populateTaxonomies() {
            const genres = new Set();
            const disks = new Set();
            state.movies.forEach(m => {
                const diskName = m.disk ? m.disk.trim() : "Adata";
                disks.add(diskName);

                if(m.meta && m.meta !== "Desconocido") {
                    const genreChunk = m.meta.split('·')[0];
                    genreChunk.split(',').forEach(g => {
                        if(g.trim()) genres.add(g.trim());
                    });
                }
            });

            const gSel = document.getElementById('filtGenre');
            const prevG = gSel.value;
            gSel.innerHTML = '<option value="">Cualquier Género</option>' + [...genres].sort().map(g => `<option value="${g}">${g}</option>`).join('');
            if([...genres].includes(prevG)) gSel.value = prevG;

            const dSel = document.getElementById('filtDisk');
            const prevD = dSel.value;
            dSel.innerHTML = '<option value="">Cualquier Disco</option>' + [...disks].sort().map(d => `<option value="${d}">💾 ${d}</option>`).join('');
            if([...disks].includes(prevD)) dSel.value = prevD;
        }

        function render() {
            const grid = document.getElementById('catalogGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const sortOp = document.getElementById('sortSelect').value;
            
            const genre = document.getElementById('filtGenre').value;
            const location = document.getElementById('filtLocation').value;
            const disk = document.getElementById('filtDisk').value;
            const type = document.getElementById('filtType').value;
            const watched = document.getElementById('filtWatched').value;
            const shortlist = document.getElementById('filtShortlist').value;
            
            grid.innerHTML = '';
            
            let filtered = state.movies.filter(m => {
                const mDisk = m.disk ? m.disk.trim() : "Adata";
                if(disk && mDisk !== disk) return false;
                if(location && m.category !== location) return false;
                if(type && m.type !== type) return false;
                if(genre && (!m.meta || !m.meta.includes(genre))) return false;
                if(watched !== "") {
                    const isW = !!m.watched;
                    if(String(isW) !== watched) return false;
                }
                if(shortlist === "true" && !m.shortlisted) return false;
                if(search && !(m.title.toLowerCase().includes(search) || (m.meta && m.meta.toLowerCase().includes(search)))) return false;
                return true;
            });

            const getSafeNumber = (val) => isNaN(parseFloat(val)) ? 0 : parseFloat(val);

            if (sortOp === 'year_desc') {
                filtered.sort((a,b) => getSafeNumber(b.year) - getSafeNumber(a.year));
            } else if (sortOp === 'year_asc') {
                filtered.sort((a,b) => getSafeNumber(a.year) - getSafeNumber(b.year));
            } else if (sortOp === 'title_az') {
                filtered.sort((a,b) => a.title.localeCompare(b.title));
            } else if (sortOp === 'rating_desc') {
                filtered.sort((a,b) => getSafeNumber(b.rating) - getSafeNumber(a.rating));
            } else {
                filtered.sort((a,b) => b.id.localeCompare(a.id));
            }

            if(filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state">No se encontraron títulos en tu catálogo. Añadí uno arriba.</div>';
                return;
            }

            filtered.forEach(m => {
                const card = document.createElement('div');
                card.className = `movie-card ${m.watched ? 'is-watched' : ''}`;
                
                const imdbLink = m.imdbID ? `https://www.imdb.com/title/${m.imdbID}/` : `https://www.imdb.com/find/?q=${encodeURIComponent(m.title)}`;
                const posterStyle = m.poster ? '' : 'style="display:flex;align-items:center;justify-content:center;background:#2c2c2e;height:100%;font-size:3rem;padding:2.5rem 0;"';
                const posterHtml = m.poster 
                    ? `<img src="${m.poster}" class="poster-img" alt="Poster" onerror="this.style.display='none'; this.parentElement.innerHTML='🎬';">`
                    : `🎬`;
                
                const diskLabel = m.disk ? m.disk.trim() : 'Adata';
                const locLabel = m.category === 'all' ? 'Raíz' : m.category;
                const typeLabel = m.type || 'Película';

                let seriesBadge = "";
                if(m.type === "Serie" && m.seriesInfo) {
                    seriesBadge = `<div style="font-size:0.65rem; color:var(--accent); font-weight:700; margin-top:0.2rem;">📺 ${m.seriesInfo}</div>`;
                }

                card.innerHTML = `
                    <div class="poster-wrapper" ${posterStyle} onclick="window.open('${imdbLink}', '_blank')" title="Abrir en IMDb">
                        ${posterHtml}
                        ${m.shortlisted ? '<div class="shortlist-badge">📌 PRÓXIMA</div>' : ''}
                        <div class="folder-badge">💾 ${diskLabel} · ${locLabel} · ${typeLabel}</div>
                        ${m.rating && m.rating !== "0.0" ? `<div class="rating-badge">⭐ ${m.rating}</div>` : ''}
                        ${m.watched ? '<div class="watched-badge">✅ VISTA</div>' : ''}
                    </div>
                    <div class="movie-info">
                        <div class="movie-title">${m.title}</div>
                        <div class="movie-meta">${m.year} · ${m.meta.split('·')[0]}</div>
                        ${seriesBadge}
                        <div class="movie-plot">${m.plot}</div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-card ${m.watched ? 'action' : ''}" onclick="toggleWatched('${m.id}')">${m.watched ? 'No Vista' : '✅ Vista'}</button>
                        <button class="btn-card" onclick="toggleShortlist('${m.id}')" style="color: ${m.shortlisted ? 'var(--accent)' : 'inherit'}">${m.shortlisted ? 'Quitar 📌' : '📌 Próxima'}</button>
                        ${m.type === 'Serie' ? `<button class="btn-card success" onclick="showSeriesDetails('${m.id}')">Episodios</button>` : `<button class="btn-card" onclick="editMovieInline('${m.id}')">Editar</button>`}
                        <button class="btn-card del" onclick="deleteMovie('${m.id}')">Quitar del Catálogo</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.onload = function() {
            populateTaxonomies();
            render();
            setTimeout(() => { autoPullFromCloud(); }, 150);
        };

        document.addEventListener("visibilitychange", async () => {
            if (!document.hidden) {
                await autoPullFromCloud();
            }
        });
    </script>
